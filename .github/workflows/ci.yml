name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (root package)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The root SwiftPM package (NotchideKit + notchide-hook) has ZERO external
      # dependencies, so it builds and tests fully offline. The GUI app/ package
      # (which depends on DynamicNotchKit) is verified by the build-app job below.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  build-app:
    name: Build (GUI app package)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # macos-latest ships full Xcode, so DynamicNotchKit's SwiftUI @Entry /
      # #Preview macros resolve here (they do NOT under Command Line Tools alone,
      # which is why local CLT-only machines can't build the GUI package directly).
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app package
        run: swift build --package-path app -v
