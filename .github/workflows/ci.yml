name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (root package)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The root SwiftPM package (NotchideKit + notchide-hook) has ZERO external
      # dependencies, so it builds and tests fully offline on the CI runner.
      # The GUI lives in the nested app/ package and depends on DynamicNotchKit;
      # it is built on the developer's Mac, not here.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v
